<!DOCTYPE html>

<head>

<style>
  body {

    background: rgba(255,255,255,0.95);

    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    word-break: break-word;
    pointer-events: none;
    user-select: none;
  }

  .bubble::after {
    content: "";
    position: absolute;
    bottom: -14px;
    left: 28px;
    border-width: 14px 12px 0;
    border-style: solid;
    border-color: #444 transparent transparent;
  }

  @media (max-width: 768px) {
    * {
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  }

const source = params.get("source") || "default";

const UPDATE_INTERVAL = 5000;

const LAYERS = 4;
const SIZE = [0.8, 0.6, 0.5, 0.4];
const OPACITY = [1.0, 0.75, 0.55, 0.35];

const FLOAT_RADIUS_BASE = 28;
const FLOAT_SPEED_BASE  = 0.0012;

/* 小刻み揺れを抑える */
const NOISE_RADIUS = 0;
const NOISE_SPEED  = 0.003;

const stage = document.getElementById("stage");
let bubbles = {};
let lastTime = performance.now();

/* 文字列から安定した数値を作る */
function hashString(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function seededRandom(seed) {
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

/* 重なり緩和 */
function relaxOverlap(list) {
  const MIN_DIST = 160;
  const POWER = 0.22;

  for (let i = 0; i < list.length; i++) {
    for (let j = i + 1; j < list.length; j++) {
      const a = list[i];
      const b = list[j];
      const dx = a.baseX - b.baseX;
      const dy = a.baseY - b.baseY;
      const dist = Math.hypot(dx, dy);

      if (dist < MIN_DIST) {
        const push = (MIN_DIST - dist) * POWER;
        const nx = dx / (dist || 1);
        const ny = dy / (dist || 1);

        a.baseX += nx * push;
        a.baseY += ny * push;
        b.baseX -= nx * push;
        b.baseY -= ny * push;
      }
    }
  }
}

/* 中心から拡散 */
function disperseFromCenter(list, cx, cy) {
  const POWER = 0.12;

  list.forEach(b => {
    const dx = b.baseX - cx;
    const dy = b.baseY - cy;
    const dist = Math.hypot(dx, dy) || 1;
    const push = Math.max(0, 240 - dist) * POWER;

    b.baseX += (dx / dist) * push;
    b.baseY += (dy / dist) * push;
  });
}

/* アニメーション */
function animate(now) {
  const delta = Math.min((now - lastTime) / 16.666, 2);
  lastTime = now;

  Object.values(bubbles).forEach(b => {
    b.phase += b.floatSpeed * delta;
    b.noisePhase += NOISE_SPEED * delta;

    const fx = Math.cos(b.phase) * b.floatRadius;
    const fy = Math.sin(b.phase) * b.floatRadius;
    const nx = Math.cos(b.noisePhase * 1.7) * NOISE_RADIUS;
    const ny = Math.sin(b.noisePhase * 1.3) * NOISE_RADIUS;

    b.x += (b.baseX + fx + nx - b.x) * 0.025 * delta;
    b.y += (b.baseY + fy + ny - b.y) * 0.025 * delta;

    b.el.style.left = `${b.x}px`;
    b.el.style.top  = `${b.y}px`;
  });

  requestAnimationFrame(animate);
}
