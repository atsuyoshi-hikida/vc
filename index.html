<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Cloud Safe</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      overflow: hidden;
      position: relative;
      background: #d8ecff;
    }

    #sky {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(to bottom, #d8efff 0%, #bfe5ff 45%, #eaf6ff 100%);
    }

    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,0.98);
      box-shadow: 0 0 10px rgba(255,255,255,0.65);
      will-change: transform, opacity;
    }

    .shooting-star {
      position: absolute;
      width: 120px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(
        to right,
        rgba(255,255,255,0),
        rgba(255,255,255,0.98)
      );
      transform: rotate(-18deg);
      opacity: 0;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
      will-change: transform, opacity;
    }

    #rain {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 1;
    }

    .raindrop {
      position: absolute;
      top: -12vh;
      width: 2px;
      height: 56px;
      border-radius: 999px;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0.22),
        rgba(255,255,255,0.55)
      );
      transform: rotate(12deg);
      opacity: 0.5;
      will-change: transform, opacity;
      animation-name: rainFall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes rainFall {
      0% {
        transform: translate3d(0, -10vh, 0) rotate(12deg);
        opacity: 0;
      }
      10% {
        opacity: 0.45;
      }
      100% {
        transform: translate3d(18vw, 120vh, 0) rotate(12deg);
        opacity: 0;
      }
    }

    #ui {
      position: relative;
      z-index: 1;
    }

    #statusLine {
      position: sticky;
      top: 0;
      z-index: 10;
      display: inline-block;
      max-width: calc(100vw - 40px);
      margin-bottom: 14px;
      padding: 4px 10px;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(20, 20, 20, 0.72);
      background: rgba(255,255,255,0.38);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      user-select: none;
    }

    #stage {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      align-content: flex-start;
      justify-content: flex-start;
      gap: 0;
      position: relative;
      min-height: calc(100vh - 80px);
      padding-top: 8px;
    }

    #stage.center-mode {
      justify-content: center;
      align-content: center;
      padding-top: 0;
    }

    .bubble {
      max-width: 260px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.95);
      border: 2px solid #444;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      word-break: break-word;
      line-height: 1.5;
      position: relative;
      will-change: transform, opacity;
      animation-name: floatBubble;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
      transform-origin: center center;
      margin-right: -20px;
      margin-bottom: 4px;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .bubble::before {
      content: "";
      position: absolute;
      bottom: -14px;
      left: 25px;
      border-width: 14px 12px 0;
      border-style: solid;
      border-color: #444 transparent transparent;
    }

    .bubble::after {
      content: "";
      position: absolute;
      bottom: -12px;
      left: 27px;
      border-width: 12px 10px 0;
      border-style: solid;
      border-color: rgba(255,255,255,0.95) transparent transparent;
    }

    .bubble.newborn {
      animation-name: bubbleAppear, floatBubble;
      animation-duration: 0.35s, var(--bubble-float-duration, 6s);
      animation-delay: 0s, var(--bubble-float-delay, 0s);
      animation-fill-mode: both, none;
      animation-timing-function: ease-out, ease-in-out;
      animation-iteration-count: 1, infinite;
      animation-direction: normal, alternate;
    }

    @keyframes bubbleAppear {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(calc(var(--bubble-scale, 1) * 0.92));
      }
      100% {
        opacity: var(--bubble-opacity, 1);
        transform: translateY(0px) scale(var(--bubble-scale, 1));
      }
    }

    @keyframes floatBubble {
      0% {
        transform: translate(0px, 0px) scale(var(--bubble-scale, 1));
      }
      25% {
        transform: translate(4px, -6px) scale(var(--bubble-scale, 1));
      }
      50% {
        transform: translate(-3px, -10px) scale(var(--bubble-scale, 1));
      }
      75% {
        transform: translate(5px, -4px) scale(var(--bubble-scale, 1));
      }
      100% {
        transform: translate(-4px, 2px) scale(var(--bubble-scale, 1));
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 14px;
      }

      #statusLine {
        max-width: calc(100vw - 28px);
        font-size: 11px;
      }

      .raindrop {
        height: 44px;
        width: 2px;
      }

      #stage {
        min-height: calc(100vh - 70px);
      }

      .shooting-star {
        width: 90px;
      }
    }
  </style>
</head>
<body>

<div id="sky"></div>
<div id="stars"></div>
<div id="rain"></div>

<div id="ui">
  <div id="statusLine">status: loading...</div>
  <div id="stage"></div>
</div>

<script>
  var statusLineEl = document.getElementById("statusLine");
  var stage = document.getElementById("stage");
  var rainEl = document.getElementById("rain");
  var starsEl = document.getElementById("stars");
  var skyEl = document.getElementById("sky");

  var LAYERS = 4;
  var SIZE = [1.0, 0.85, 0.72, 0.60];
  var OPACITY = [1.0, 0.82, 0.64, 0.46];
  var CENTER_MODE_THRESHOLD = 8;
  var UPDATE_INTERVAL = 5000;

  var CYCLE_SECONDS = 1200; // 20分で1日
  var syncedServerNowMs = null;
  var syncedClientStartMs = null;
  var stars = [];
  var shootingStars = [];
  var skyLoopStarted = false;

  var bubbleMap = {};
  var emptyBubbleKey = "__empty__";

  function setStatusLine(text) {
    statusLineEl.textContent = text;
  }

  window.onerror = function(message, source, lineno, colno) {
    setStatusLine(
      "error | " +
      "message: " + message +
      " | line: " + lineno +
      " | col: " + colno
    );
  };

  function hashString(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  function seeded(seed) {
    var x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function mixColor(c1, c2, t) {
    return [
      Math.round(lerp(c1[0], c2[0], t)),
      Math.round(lerp(c1[1], c2[1], t)),
      Math.round(lerp(c1[2], c2[2], t))
    ];
  }

  function colorToCss(c) {
    return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
  }

  function getSkyKeyframes() {
    return [
      { p: 0.00, top: [120,145,179], mid: [182,199,217], bot: [237,245,251] },
      { p: 0.14, top: [185,220,255], mid: [217,239,255], bot: [245,251,255] },
      { p: 0.34, top: [159,215,255], mid: [207,238,255], bot: [243,251,255] },
      { p: 0.54, top: [126,200,255], mid: [191,232,255], bot: [238,249,255] },
      { p: 0.70, top: [69,109,168], mid: [126,159,192], bot: [201,215,230] },
      { p: 0.78, top: [5,18,32], mid: [10,19,36], bot: [16,35,61] },
      { p: 0.84, top: [0,0,106], mid: [0,11,58], bot: [6,20,39] },
      { p: 0.94, top: [0,0,106], mid: [0,11,58], bot: [6,20,39] },
      { p: 0.96, top: [30,45,73], mid: [76,98,128], bot: [159,176,196] },
      { p: 0.98, top: [80,109,145], mid: [145,170,194], bot: [215,228,239] },
      { p: 1.00, top: [120,145,179], mid: [182,199,217], bot: [237,245,251] }
    ];
  }

  function getInterpolatedSky(phase) {
    var frames = getSkyKeyframes();
    for (var i = 0; i < frames.length - 1; i++) {
      var a = frames[i];
      var b = frames[i + 1];
      if (phase >= a.p && phase <= b.p) {
        var span = b.p - a.p || 1;
        var t = (phase - a.p) / span;
        return {
          top: mixColor(a.top, b.top, t),
          mid: mixColor(a.mid, b.mid, t),
          bot: mixColor(a.bot, b.bot, t)
        };
      }
    }
    return {
      top: frames[frames.length - 1].top,
      mid: frames[frames.length - 1].mid,
      bot: frames[frames.length - 1].bot
    };
  }

  function getNightOpacity(phase) {
    if (phase < 0.72) return 0;
    if (phase < 0.80) return (phase - 0.72) / 0.08 * 0.55;
    if (phase < 0.84) return 0.55 + (phase - 0.80) / 0.04 * 0.45;
    if (phase < 0.94) return 1;
    if (phase < 0.97) return 1 - (phase - 0.94) / 0.03 * 0.55;
    if (phase < 1.00) return 0.45 - (phase - 0.97) / 0.03 * 0.45;
    return 0;
  }

  function getRainOpacity(phase) {
    if (phase < 0.74) return 1;
    if (phase < 0.82) return 1 - (phase - 0.74) / 0.08;
    if (phase < 0.98) return 0;
    if (phase <= 1.00) return (phase - 0.98) / 0.02;
    return 1;
  }

  function buildRain(serverNowMs) {
    rainEl.innerHTML = "";

    var isMobile = window.innerWidth <= 768;
    var dropCount = isMobile ? 24 : 38;
    var nowSec = serverNowMs / 1000;

    for (var i = 0; i < dropCount; i++) {
      var drop = document.createElement("div");
      drop.className = "raindrop";

      var left = (i * (100 / dropCount) + (i % 3) * 1.7 + seeded(i + 11) * 2.4) % 100;
      var duration = 1.8 + (i % 7) * 0.23 + seeded(i + 29) * 0.35;
      var opacity = 0.18 + seeded(i + 47) * 0.28;
      var height = (isMobile ? 34 : 42) + seeded(i + 61) * (isMobile ? 18 : 22);
      var offset = seeded(i + 73) * 12;

      drop.style.left = left + "vw";
      drop.style.animationDuration = duration + "s";
      drop.style.animationDelay = -((nowSec + offset) % duration) + "s";
      drop.style.opacity = opacity.toFixed(2);
      drop.style.height = height + "px";

      rainEl.appendChild(drop);
    }
  }

  function buildStars() {
    starsEl.innerHTML = "";
    stars = [];
    shootingStars = [];

    var isMobile = window.innerWidth <= 768;
    var starCount = isMobile ? 56 : 96;
    var shootingCount = isMobile ? 3 : 5;

    for (var i = 0; i < starCount; i++) {
      var starEl = document.createElement("div");
      starEl.className = "star";

      var seed = i + 101;
      var x = seeded(seed) * 100;
      var y = seeded(seed + 1) * 66;
      var size = 1 + seeded(seed + 2) * 2.6;
      var twinkleSpeed = 2.4 + seeded(seed + 3) * 3.4;
      var twinkleOffset = seeded(seed + 4) * Math.PI * 2;

      starEl.style.left = x + "vw";
      starEl.style.top = y + "vh";
      starEl.style.width = size + "px";
      starEl.style.height = size + "px";

      starsEl.appendChild(starEl);
      stars.push({
        el: starEl,
        size: size,
        twinkleSpeed: twinkleSpeed,
        twinkleOffset: twinkleOffset
      });
    }

    var configs = [
      { start: 0.828, duration: 0.012, x: 14, y: 14 },
      { start: 0.854, duration: 0.012, x: 46, y: 10 },
      { start: 0.882, duration: 0.013, x: 66, y: 22 },
      { start: 0.908, duration: 0.013, x: 28, y: 18 },
      { start: 0.934, duration: 0.014, x: 74, y: 12 }
    ];

    for (var j = 0; j < shootingCount; j++) {
      var shotEl = document.createElement("div");
      shotEl.className = "shooting-star";
      starsEl.appendChild(shotEl);

      var cfg = configs[j];
      shootingStars.push({
        el: shotEl,
        start: cfg.start,
        duration: cfg.duration,
        x: cfg.x,
        y: cfg.y
      });
    }
  }

  function getSyncedNowMs() {
    if (syncedServerNowMs === null || syncedClientStartMs === null) {
      return Date.now();
    }
    return syncedServerNowMs + (Date.now() - syncedClientStartMs);
  }

  function updateSkyAndStars() {
    var nowMs = getSyncedNowMs();
    var phase = ((nowMs / 1000) % CYCLE_SECONDS) / CYCLE_SECONDS;

    var sky = getInterpolatedSky(phase);
    skyEl.style.background = "linear-gradient(to bottom, " +
      colorToCss(sky.top) + " 0%, " +
      colorToCss(sky.mid) + " 46%, " +
      colorToCss(sky.bot) + " 100%)";

    var nightOpacity = getNightOpacity(phase);
    starsEl.style.opacity = String(nightOpacity);

    var rainOpacity = getRainOpacity(phase);
    rainEl.style.opacity = String(rainOpacity);

    var seconds = nowMs / 1000;

    for (var i = 0; i < stars.length; i++) {
      var star = stars[i];
      var tw = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(seconds * (2 * Math.PI / star.twinkleSpeed) + star.twinkleOffset));
      var scale = 0.85 + tw * 0.45;
      star.el.style.opacity = (nightOpacity * tw).toFixed(3);
      star.el.style.transform = "scale(" + scale.toFixed(3) + ")";
    }

    for (var j = 0; j < shootingStars.length; j++) {
      var shot = shootingStars[j];
      var start = shot.start;
      var end = shot.start + shot.duration;
      var local;

      if (phase >= start && phase <= end) {
        local = (phase - start) / shot.duration;
      } else {
        local = -1;
      }

      if (local >= 0) {
        var x = shot.x + local * 18;
        var y = shot.y + local * 12;
        var opacity = local < 0.15 ? (local / 0.15) : (1 - local) / 0.85;
        opacity = Math.max(0, Math.min(1, opacity)) * nightOpacity;

        shot.el.style.left = x + "vw";
        shot.el.style.top = y + "vh";
        shot.el.style.opacity = opacity.toFixed(3);
      } else {
        shot.el.style.opacity = "0";
      }
    }

    requestAnimationFrame(updateSkyAndStars);
  }

  function getLayerInfo(index, total) {
    var perLayer = Math.ceil(total / 4) || 1;
    var layer = Math.min(Math.floor(index / perLayer), 3);

    return {
      scale: [1.0, 0.85, 0.72, 0.60][layer],
      opacity: [1.0, 0.82, 0.64, 0.46][layer]
    };
  }

  function applyBubbleAnimation(el, index, scatterKey) {
    var duration = 5 + (index % 5) * 0.8 + (scatterKey % 3) * 0.25;
    var delay = (index % 7) * 0.4;
    el.style.setProperty("--bubble-float-duration", duration + "s");
    el.style.setProperty("--bubble-float-delay", delay + "s");
    el.style.animationDuration = duration + "s";
    el.style.animationDelay = delay + "s";
  }

  function applyScatterStyle(el, scatterKey, centerMode, ageIndex) {
    if (centerMode) {
      var centerTop = (scatterKey % 19) - 9;
      var centerLeft = (Math.floor(scatterKey / 10) % 17) - 8;
      var centerRightOverlap = -8 - (scatterKey % 12);
      var centerBottom = (Math.floor(scatterKey / 100) % 8) - 2;
      var agePull = Math.min(ageIndex, 6);
      centerLeft = centerLeft - agePull * 0.6;

      el.style.marginTop = centerTop + "px";
      el.style.marginLeft = centerLeft + "px";
      el.style.marginRight = centerRightOverlap + "px";
      el.style.marginBottom = centerBottom + "px";
      return;
    }

    var topOffset = (scatterKey % 41) - 20;
    var leftOffset = (Math.floor(scatterKey / 10) % 25) - 12;
    var rightOverlap = -10 - (scatterKey % 25);
    var bottomOffset = (Math.floor(scatterKey / 100) % 14) - 4;

    el.style.marginTop = topOffset + "px";
    el.style.marginLeft = leftOffset + "px";
    el.style.marginRight = rightOverlap + "px";
    el.style.marginBottom = bottomOffset + "px";
  }

  function buildMessageKeys(messages) {
    var counts = {};
    return messages.map(function(msg) {
      var text = String(msg.text || "");
      counts[text] = (counts[text] || 0) + 1;
      return text + "__" + counts[text];
    });
  }

  function createBubble(key, text, renderIndex, ageIndex, total, centerMode) {
    var el = document.createElement("div");
    el.className = "bubble newborn";
    el.textContent = text;

    var scatterKey = hashString(key);
    var layerInfo = getLayerInfo(ageIndex, total);

    el.style.zIndex = String(total - ageIndex);
    el.style.setProperty("--bubble-scale", String(layerInfo.scale));
    el.style.setProperty("--bubble-opacity", String(layerInfo.opacity));
    el.style.opacity = String(layerInfo.opacity);

    applyScatterStyle(el, scatterKey, centerMode, ageIndex);
    applyBubbleAnimation(el, renderIndex, scatterKey);

    el.style.order = String(renderIndex);
    stage.appendChild(el);

    setTimeout(function() {
      if (el.classList.contains("newborn")) {
        el.classList.remove("newborn");
      }
    }, 500);

    bubbleMap[key] = {
      el: el,
      text: text
    };
  }

  function updateBubble(key, text, renderIndex, ageIndex, total, centerMode) {
    var item = bubbleMap[key];
    var el = item.el;
    var scatterKey = hashString(key);
    var layerInfo = getLayerInfo(ageIndex, total);

    if (item.text !== text) {
      el.textContent = text;
      item.text = text;
    }

    el.style.zIndex = String(total - ageIndex);
    el.style.setProperty("--bubble-scale", String(layerInfo.scale));
    el.style.setProperty("--bubble-opacity", String(layerInfo.opacity));
    el.style.opacity = String(layerInfo.opacity);
    el.style.order = String(renderIndex);

    applyScatterStyle(el, scatterKey, centerMode, ageIndex);
    applyBubbleAnimation(el, renderIndex, scatterKey);
  }

  function removeMissingBubbles(nextKeySet) {
    Object.keys(bubbleMap).forEach(function(key) {
      if (!nextKeySet.has(key)) {
        bubbleMap[key].el.remove();
        delete bubbleMap[key];
      }
    });
  }

  function clearPlaceholderIfNeeded() {
    if (bubbleMap[emptyBubbleKey]) {
      bubbleMap[emptyBubbleKey].el.remove();
      delete bubbleMap[emptyBubbleKey];
    }
  }

  function renderEmpty(centerMode) {
    removeMissingBubbles(new Set([emptyBubbleKey]));

    if (!bubbleMap[emptyBubbleKey]) {
      createBubble(emptyBubbleKey, "messages が 0 件です", 0, 0, 1, centerMode);
    } else {
      updateBubble(emptyBubbleKey, "messages が 0 件です", 0, 0, 1, centerMode);
    }
  }

  function syncMessages(messages) {
    var centerMode = messages.length > 0 && messages.length <= CENTER_MODE_THRESHOLD;

    if (centerMode) {
      stage.classList.add("center-mode");
    } else {
      stage.classList.remove("center-mode");
    }

    if (messages.length === 0) {
      renderEmpty(centerMode);
      return;
    }

    clearPlaceholderIfNeeded();

    var keys = buildMessageKeys(messages);
    var visualItems = messages.map(function(msg, i) {
      return {
        key: keys[i],
        text: String(msg.text || ""),
        ageIndex: i
      };
    });

    visualItems.sort(function(a, b) {
      return hashString(a.key) - hashString(b.key);
    });

    var nextKeySet = new Set(visualItems.map(function(item) { return item.key; }));

    visualItems.forEach(function(item, renderIndex) {
      if (!bubbleMap[item.key]) {
        createBubble(item.key, item.text, renderIndex, item.ageIndex, messages.length, centerMode);
      } else {
        updateBubble(item.key, item.text, renderIndex, item.ageIndex, messages.length, centerMode);
      }
    });

    removeMissingBubbles(nextKeySet);
  }

  var apiBaseUrl = "https://script.google.com/macros/s/AKfycbxMjaP_v9pUhkILWdtbDh7pBujrMNp3glAUBp18qutF6-b09VytSM9OMB2agWxWbKQe/exec";
  var params = new URLSearchParams(window.location.search);
  var source = params.get("source") || "default";
  var session = params.get("session") || "";
  var apiUrl = apiBaseUrl + "?source=" + encodeURIComponent(source) + "&session=" + encodeURIComponent(session);

  async function updateMessages() {
    try {
      var res = await fetch(apiUrl, { cache: "no-store" });
      var data = await res.json();

      var active = !!data.active;
      var messages = Array.isArray(data.messages) ? data.messages : [];
      var reason = data.reason || "-";
      var serverNow = typeof data.serverNow === "number" ? data.serverNow : Date.now();

      syncedServerNowMs = serverNow;
      syncedClientStartMs = Date.now();

      if (!skyLoopStarted) {
        buildRain(serverNow);
        buildStars();
        updateSkyAndStars();
        skyLoopStarted = true;
      }

      setStatusLine(
        "source=" + source +
        " | session=" + (session || "-") +
        " | active=" + active +
        " | messages=" + messages.length +
        " | reason=" + reason +
        " | sync=server"
      );

      if (!active) {
        Object.keys(bubbleMap).forEach(function(key) {
          bubbleMap[key].el.remove();
        });
        bubbleMap = {};
        return;
      }

      syncMessages(messages);

    } catch (err) {
      setStatusLine(
        "source=" + source +
        " | session=" + (session || "-") +
        " | fetch=error" +
        " | message=" + err.message
      );
    }
  }

  setStatusLine(
    "source=" + source +
    " | session=" + (session || "-") +
    " | status=loading"
  );

  updateMessages();
  setInterval(updateMessages, UPDATE_INTERVAL);

  window.addEventListener("resize", function() {
    var nowMs = getSyncedNowMs();
    buildRain(nowMs);
    buildStars();
  });
</script>

</body>
</html>
