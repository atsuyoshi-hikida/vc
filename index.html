<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Cloud</title>

<style>
  body {
    margin: 0;
    padding: 24px;
    background: #eaf5ff;
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }

  #stage {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-start;
  }

  .bubble {
    max-width: 260px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.95);
    border: 2px solid #444;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    word-break: break-word;
  }

  #debug {
    margin-bottom: 20px;
    padding: 12px 14px;
    border-radius: 10px;
    background: rgba(0,0,0,0.78);
    color: #fff;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
</style>
</head>

<body>
<div id="debug">読み込み中...</div>
<div id="stage"></div>

<script>
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbwVCvpcSZTDfiKC-dRwm5_zEzd8ndvBM4RiRsT13Tv0tWfGzEbtzRnZ3Jx8RPFwKxJD/exec";
const params = new URLSearchParams(window.location.search);
const source = params.get("source") || "default";
const API_URL = `${API_BASE_URL}?source=${encodeURIComponent(source)}`;

const stage = document.getElementById("stage");
const debug = document.getElementById("debug");

async function render() {
  try {
    debug.textContent = "fetch中...\n" + API_URL;

    const res = await fetch(API_URL, { cache: "no-store" });
    const data = await res.json();
    const messages = Array.isArray(data.messages) ? data.messages : [];

    debug.textContent =
      "status: " + res.status + "\n" +
      "source: " + source + "\n" +
      "messages: " + messages.length;

    stage.innerHTML = "";

    messages.forEach((msg, i) => {
      const el = document.createElement("div");
      el.className = "bubble";
      el.textContent = (i + 1) + ". " + (msg.text || "");
      stage.appendChild(el);
    });

    if (messages.length === 0) {
      const el = document.createElement("div");
      el.className = "bubble";
      el.textContent = "messages が 0 件です";
      stage.appendChild(el);
    }

  } catch (error) {
    debug.textContent = "エラー: " + error.message;
  }
}

render();
</script>
</body>
</html>
