<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Cloud Safe</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      overflow: hidden;
      position: relative;
      background: #d8ecff;
    }

    /* 背景の昼夜変化 */
    #sky {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(
          to bottom,
          #d8efff 0%,
          #bfe5ff 45%,
          #eaf6ff 100%
        );
      animation: skyCycle 1200s linear infinite;
    }

    @keyframes skyCycle {
      0% {
        background:
          linear-gradient(
            to bottom,
            #8ea6c9 0%,
            #d8b4a0 45%,
            #f7d9b8 100%
          );
      }

      15% {
        background:
          linear-gradient(
            to bottom,
            #b9dcff 0%,
            #d9efff 50%,
            #f5fbff 100%
          );
      }

      35% {
        background:
          linear-gradient(
            to bottom,
            #9fd7ff 0%,
            #cfeeff 55%,
            #f3fbff 100%
          );
      }

      55% {
        background:
          linear-gradient(
            to bottom,
            #7ec8ff 0%,
            #bfe8ff 55%,
            #eef9ff 100%
          );
      }

      72% {
        background:
          linear-gradient(
            to bottom,
            #5a86c9 0%,
            #e0a07a 52%,
            #ffd5a6 100%
          );
      }

      85% {
        background:
          linear-gradient(
            to bottom,
            #0f1830 0%,
            #1a2d53 50%,
            #2f456c 100%
          );
      }

      100% {
        background:
          linear-gradient(
            to bottom,
            #8ea6c9 0%,
            #d8b4a0 45%,
            #f7d9b8 100%
          );
      }
    }

    #ui {
      position: relative;
      z-index: 1;
    }

    /* 小さな1行ステータス */
    #statusLine {
      position: sticky;
      top: 0;
      z-index: 10;
      display: inline-block;
      max-width: calc(100vw - 40px);
      margin-bottom: 14px;
      padding: 4px 10px;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(20, 20, 20, 0.72);
      background: rgba(255,255,255,0.38);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      user-select: none;
    }

    #stage {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 0;
      position: relative;
      padding-top: 8px;
    }

    .bubble {
      max-width: 260px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.95);
      border: 2px solid #444;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      word-break: break-word;
      line-height: 1.5;
      position: relative;
      will-change: transform, opacity;
      animation-name: floatBubble;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
      transform-origin: center center;

      /* 基本の重なり */
      margin-right: -20px;
      margin-bottom: 4px;
    }

    .bubble::after {
      content: "";
      position: absolute;
      bottom: -14px;
      left: 28px;
      border-width: 14px 12px 0;
      border-style: solid;
      border-color: #444 transparent transparent;
    }

    @keyframes floatBubble {
      0% {
        transform: translate(0px, 0px) scale(var(--bubble-scale, 1));
      }
      25% {
        transform: translate(4px, -6px) scale(var(--bubble-scale, 1));
      }
      50% {
        transform: translate(-3px, -10px) scale(var(--bubble-scale, 1));
      }
      75% {
        transform: translate(5px, -4px) scale(var(--bubble-scale, 1));
      }
      100% {
        transform: translate(-4px, 2px) scale(var(--bubble-scale, 1));
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 14px;
      }

      #statusLine {
        max-width: calc(100vw - 28px);
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

<div id="sky"></div>

<div id="ui">
  <div id="statusLine">status: loading...</div>
  <div id="stage"></div>
</div>

<script>
  var statusLineEl = document.getElementById("statusLine");
  var stage = document.getElementById("stage");

  var LAYERS = 4;
  var SIZE = [1.0, 0.85, 0.72, 0.60];
  var OPACITY = [1.0, 0.82, 0.64, 0.46];

  function setStatusLine(text) {
    statusLineEl.textContent = text;
  }

  window.onerror = function(message, source, lineno, colno) {
    setStatusLine(
      "error | " +
      "message: " + message +
      " | line: " + lineno +
      " | col: " + colno
    );
  };

  function hashString(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  function getLayerInfo(index, total) {
    var perLayer = Math.ceil(total / LAYERS) || 1;
    var layer = Math.min(Math.floor(index / perLayer), LAYERS - 1);

    return {
      layer: layer,
      scale: SIZE[layer],
      opacity: OPACITY[layer]
    };
  }

  function applyBubbleAnimation(el, index, scatterKey) {
    var duration = 5 + (index % 5) * 0.8 + (scatterKey % 3) * 0.25;
    var delay = (index % 7) * 0.4;
    el.style.animationDuration = duration + "s";
    el.style.animationDelay = delay + "s";
  }

  function applyScatterStyle(el, scatterKey) {
    /* 今のまま、散らばりだけ半歩強める */
    var topOffset = (scatterKey % 41) - 20;
    var leftOffset = (Math.floor(scatterKey / 10) % 25) - 12;
    var rightOverlap = -10 - (scatterKey % 25);
    var bottomOffset = (Math.floor(scatterKey / 100) % 14) - 4;

    el.style.marginTop = topOffset + "px";
    el.style.marginLeft = leftOffset + "px";
    el.style.marginRight = rightOverlap + "px";
    el.style.marginBottom = bottomOffset + "px";
  }

  var apiBaseUrl = "https://script.google.com/macros/s/AKfycbxMjaP_v9pUhkILWdtbDh7pBujrMNp3glAUBp18qutF6-b09VytSM9OMB2agWxWbKQe/exec";
  var params = new URLSearchParams(window.location.search);
  var source = params.get("source") || "default";
  var session = params.get("session") || "";
  var apiUrl = apiBaseUrl + "?source=" + encodeURIComponent(source) + "&session=" + encodeURIComponent(session);

  setStatusLine(
    "source=" + source +
    " | session=" + (session || "-") +
    " | status=loading"
  );

  fetch(apiUrl, { cache: "no-store" })
    .then(function(res) {
      return res.text().then(function(text) {
        return { status: res.status, text: text };
      });
    })
    .then(function(result) {
      var data;
      try {
        data = JSON.parse(result.text);
      } catch (e) {
        setStatusLine(
          "status=" + result.status +
          " | json=parse_error"
        );
        return;
      }

      var active = !!data.active;
      var messages = Array.isArray(data.messages) ? data.messages : [];
      var reason = data.reason || "-";

      setStatusLine(
        "source=" + source +
        " | session=" + (session || "-") +
        " | active=" + active +
        " | messages=" + messages.length +
        " | reason=" + reason
      );

      stage.innerHTML = "";

      if (!active) {
        return;
      }

      if (messages.length === 0) {
        var emptyEl = document.createElement("div");
        emptyEl.className = "bubble";
        emptyEl.textContent = "messages が 0 件です";
        emptyEl.style.setProperty("--bubble-scale", "1");
        emptyEl.style.opacity = "1";
        emptyEl.style.zIndex = "1";
        applyBubbleAnimation(emptyEl, 0, 0);
        applyScatterStyle(emptyEl, 0);
        stage.appendChild(emptyEl);
        return;
      }

      var visualItems = messages.map(function(msg, i) {
        var text = String(msg.text || "");
        return {
          text: text,
          ageIndex: i,
          scatterKey: hashString(text + "__" + i)
        };
      });

      /* 全体に散るよう、見た目の並びを安定シャッフル */
      visualItems.sort(function(a, b) {
        return a.scatterKey - b.scatterKey;
      });

      visualItems.forEach(function(item, renderIndex) {
        var layerInfo = getLayerInfo(item.ageIndex, messages.length);

        var el = document.createElement("div");
        el.className = "bubble";
        el.textContent = item.text;

        /* 最新を前面、古いものを背面 */
        el.style.zIndex = String(messages.length - item.ageIndex);

        /* 新しい投稿ほど大きく・濃く */
        el.style.setProperty("--bubble-scale", String(layerInfo.scale));
        el.style.opacity = String(layerInfo.opacity);

        /* 散らばり */
        applyScatterStyle(el, item.scatterKey);

        /* 動き */
        applyBubbleAnimation(el, renderIndex, item.scatterKey);

        stage.appendChild(el);
      });
    })
    .catch(function(err) {
      setStatusLine(
        "source=" + source +
        " | session=" + (session || "-") +
        " | fetch=error" +
        " | message=" + err.message
      );
    });
</script>

</body>
</html>
