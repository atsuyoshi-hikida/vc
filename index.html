<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Cloud Safe</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      overflow: hidden;
      position: relative;
      background: #d8ecff;
    }

    /* 背景の昼夜変化 */
    #sky {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(
          to bottom,
          #d8efff 0%,
          #bfe5ff 45%,
          #eaf6ff 100%
        );
      animation: skyCycle 1200s linear infinite;
    }

    @keyframes skyCycle {
      /* 明け方（暖色なし、青〜淡い灰青） */
      0% {
        background:
          linear-gradient(
            to bottom,
            #7891b3 0%,
            #b6c7d9 46%,
            #edf5fb 100%
          );
      }

      /* 朝 */
      14% {
        background:
          linear-gradient(
            to bottom,
            #b9dcff 0%,
            #d9efff 50%,
            #f5fbff 100%
          );
      }

      /* 昼 */
      34% {
        background:
          linear-gradient(
            to bottom,
            #9fd7ff 0%,
            #cfeeff 55%,
            #f3fbff 100%
          );
      }

      /* 午後 */
      54% {
        background:
          linear-gradient(
            to bottom,
            #7ec8ff 0%,
            #bfe8ff 55%,
            #eef9ff 100%
          );
      }

      /* 夕方（暖色は控えめ） */
      70% {
        background:
          linear-gradient(
            to bottom,
            #456da8 0%,
            #7e9fc0 50%,
            #c9d7e6 100%
          );
      }

      /* 宵 */
      78% {
        background:
          linear-gradient(
            to bottom,
            #091220 0%,
            #0f1d34 50%,
            #18304f 100%
          );
      }

      /* 深い夜（上部だけ #00006a に調整） */
      84% {
        background:
          linear-gradient(
            to bottom,
            #00006a 0%,
            #000b3a 40%,
            #061427 100%
          );
      }

      94% {
        background:
          linear-gradient(
            to bottom,
            #00006a 0%,
            #000b3a 40%,
            #061427 100%
          );
      }

      /* 夜明け前（徐々に明るく、暖色なし） */
      96% {
        background:
          linear-gradient(
            to bottom,
            #1e2d49 0%,
            #4c6280 46%,
            #9fb0c4 100%
          );
      }

      98% {
        background:
          linear-gradient(
            to bottom,
            #506d91 0%,
            #91aac2 46%,
            #d7e4ef 100%
          );
      }

      100% {
        background:
          linear-gradient(
            to bottom,
            #7891b3 0%,
            #b6c7d9 46%,
            #edf5fb 100%
          );
      }
    }

    /* 星と流れ星 */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      animation: starsVisibility 1200s linear infinite;
    }

    @keyframes starsVisibility {
      0%   { opacity: 0; }
      72%  { opacity: 0; }
      80%  { opacity: 0.55; }
      84%  { opacity: 1; }
      94%  { opacity: 1; }
      97%  { opacity: 0.45; }
      100% { opacity: 0; }
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,0.98);
      box-shadow: 0 0 10px rgba(255,255,255,0.65);
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.85); }
      50%      { opacity: 1; transform: scale(1.3); }
    }

    .shooting-star {
      position: absolute;
      width: 120px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(
        to right,
        rgba(255,255,255,0),
        rgba(255,255,255,0.98)
      );
      transform: rotate(-18deg);
      opacity: 0;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
      animation-name: shootingStar;
      animation-timing-function: ease-out;
      animation-iteration-count: infinite;
    }

    @keyframes shootingStar {
      0%   { transform: translate3d(0, 0, 0) rotate(-18deg); opacity: 0; }
      2%   { opacity: 0; }
      4%   { opacity: 0.98; }
      16%  { transform: translate3d(180px, 120px, 0) rotate(-18deg); opacity: 0; }
      100% { transform: translate3d(180px, 120px, 0) rotate(-18deg); opacity: 0; }
    }

    /* 軽い雨 */
    #rain {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .raindrop {
      position: absolute;
      top: -12vh;
      width: 2px;
      height: 56px;
      border-radius: 999px;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0.22),
        rgba(255,255,255,0.55)
      );
      transform: rotate(12deg);
      opacity: 0.5;
      will-change: transform, opacity;
      animation-name: rainFall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes rainFall {
      0% {
        transform: translate3d(0, -10vh, 0) rotate(12deg);
        opacity: 0;
      }
      10% {
        opacity: 0.45;
      }
      100% {
        transform: translate3d(18vw, 120vh, 0) rotate(12deg);
        opacity: 0;
      }
    }

    #ui {
      position: relative;
      z-index: 1;
    }

    /* 小さな1行ステータス */
    #statusLine {
      position: sticky;
      top: 0;
      z-index: 10;
      display: inline-block;
      max-width: calc(100vw - 40px);
      margin-bottom: 14px;
      padding: 4px 10px;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(20, 20, 20, 0.72);
      background: rgba(255,255,255,0.38);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      user-select: none;
    }

    #stage {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      align-content: flex-start;
      justify-content: flex-start;
      gap: 0;
      position: relative;
      min-height: calc(100vh - 80px);
      padding-top: 8px;
    }

    /* 少数時は中央から広がる */
    #stage.center-mode {
      justify-content: center;
      align-content: center;
      padding-top: 0;
    }

    .bubble {
      max-width: 260px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.95);
      border: 2px solid #444;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      word-break: break-word;
      line-height: 1.5;
      position: relative;
      will-change: transform, opacity;
      animation-name: floatBubble;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
      transform-origin: center center;

      /* 基本の重なり */
      margin-right: -20px;
      margin-bottom: 4px;
    }

    .bubble::after {
      content: "";
      position: absolute;
      bottom: -14px;
      left: 28px;
      border-width: 14px 12px 0;
      border-style: solid;
      border-color: #444 transparent transparent;
    }

    @keyframes floatBubble {
      0% {
        transform: translate(0px, 0px) scale(var(--bubble-scale, 1));
      }
      25% {
        transform: translate(4px, -6px) scale(var(--bubble-scale, 1));
      }
      50% {
        transform: translate(-3px, -10px) scale(var(--bubble-scale, 1));
      }
      75% {
        transform: translate(5px, -4px) scale(var(--bubble-scale, 1));
      }
      100% {
        transform: translate(-4px, 2px) scale(var(--bubble-scale, 1));
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 14px;
      }

      #statusLine {
        max-width: calc(100vw - 28px);
        font-size: 11px;
      }

      .raindrop {
        height: 44px;
        width: 2px;
      }

      #stage {
        min-height: calc(100vh - 70px);
      }

      .shooting-star {
        width: 90px;
      }
    }
  </style>
</head>
<body>

<div id="sky"></div>
<div id="stars"></div>
<div id="rain"></div>

<div id="ui">
  <div id="statusLine">status: loading...</div>
  <div id="stage"></div>
</div>

<script>
  var statusLineEl = document.getElementById("statusLine");
  var stage = document.getElementById("stage");
  var rainEl = document.getElementById("rain");
  var starsEl = document.getElementById("stars");

  var LAYERS = 4;
  var SIZE = [1.0, 0.85, 0.72, 0.60];
  var OPACITY = [1.0, 0.82, 0.64, 0.46];
  var CENTER_MODE_THRESHOLD = 8;

  function setStatusLine(text) {
    statusLineEl.textContent = text;
  }

  window.onerror = function(message, source, lineno, colno) {
    setStatusLine(
      "error | " +
      "message: " + message +
      " | line: " + lineno +
      " | col: " + colno
    );
  };

  function hashString(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  function getLayerInfo(index, total) {
    var perLayer = Math.ceil(total / LAYERS) || 1;
    var layer = Math.min(Math.floor(index / perLayer), LAYERS - 1);

    return {
      layer: layer,
      scale: SIZE[layer],
      opacity: OPACITY[layer]
    };
  }

  function applyBubbleAnimation(el, index, scatterKey) {
    var duration = 5 + (index % 5) * 0.8 + (scatterKey % 3) * 0.25;
    var delay = (index % 7) * 0.4;
    el.style.animationDuration = duration + "s";
    el.style.animationDelay = delay + "s";
  }

  function applyScatterStyle(el, scatterKey, centerMode, ageIndex) {
    if (centerMode) {
      /* 少数時は中央からゆるく広がる */
      var centerTop = (scatterKey % 19) - 9;
      var centerLeft = (Math.floor(scatterKey / 10) % 17) - 8;
      var centerRightOverlap = -8 - (scatterKey % 12);
      var centerBottom = (Math.floor(scatterKey / 100) % 8) - 2;

      /* 新しいものほど中央寄りに見えやすく少しだけ補正 */
      var agePull = Math.min(ageIndex, 6);
      centerLeft = centerLeft - agePull * 0.6;

      el.style.marginTop = centerTop + "px";
      el.style.marginLeft = centerLeft + "px";
      el.style.marginRight = centerRightOverlap + "px";
      el.style.marginBottom = centerBottom + "px";
      return;
    }

    /* 通常時は今まで通りの散らばり */
    var topOffset = (scatterKey % 41) - 20;
    var leftOffset = (Math.floor(scatterKey / 10) % 25) - 12;
    var rightOverlap = -10 - (scatterKey % 25);
    var bottomOffset = (Math.floor(scatterKey / 100) % 14) - 4;

    el.style.marginTop = topOffset + "px";
    el.style.marginLeft = leftOffset + "px";
    el.style.marginRight = rightOverlap + "px";
    el.style.marginBottom = bottomOffset + "px";
  }

  function buildRain() {
    rainEl.innerHTML = "";

    var isMobile = window.innerWidth <= 768;
    var dropCount = isMobile ? 24 : 38;

    for (var i = 0; i < dropCount; i++) {
      var drop = document.createElement("div");
      drop.className = "raindrop";

      var left = Math.random() * 100;
      var delay = Math.random() * 8;
      var duration = 1.8 + Math.random() * 1.8;
      var opacity = 0.18 + Math.random() * 0.28;
      var height = (isMobile ? 34 : 42) + Math.random() * (isMobile ? 18 : 22);

      drop.style.left = left + "vw";
      drop.style.animationDelay = delay + "s";
      drop.style.animationDuration = duration + "s";
      drop.style.opacity = opacity.toFixed(2);
      drop.style.height = height + "px";

      rainEl.appendChild(drop);
    }
  }

  function buildStars() {
    starsEl.innerHTML = "";

    var isMobile = window.innerWidth <= 768;
    var starCount = isMobile ? 48 : 82;
    var shootingCount = isMobile ? 2 : 3;

    for (var i = 0; i < starCount; i++) {
      var star = document.createElement("div");
      star.className = "star";

      star.style.left = (Math.random() * 100) + "vw";
      star.style.top = (Math.random() * 62) + "vh";
      star.style.animationDuration = (2.4 + Math.random() * 3.4) + "s";
      star.style.animationDelay = (Math.random() * 4) + "s";
      star.style.opacity = (0.28 + Math.random() * 0.72).toFixed(2);

      var size = 1 + Math.random() * 2.4;
      star.style.width = size + "px";
      star.style.height = size + "px";

      starsEl.appendChild(star);
    }

    for (var j = 0; j < shootingCount; j++) {
      var shootingStar = document.createElement("div");
      shootingStar.className = "shooting-star";

      shootingStar.style.left = (10 + Math.random() * 65) + "vw";
      shootingStar.style.top = (8 + Math.random() * 28) + "vh";
      shootingStar.style.animationDuration = (48 + Math.random() * 28) + "s";
      shootingStar.style.animationDelay = (Math.random() * 30) + "s";

      starsEl.appendChild(shootingStar);
    }
  }

  var apiBaseUrl = "https://script.google.com/macros/s/AKfycbxMjaP_v9pUhkILWdtbDh7pBujrMNp3glAUBp18qutF6-b09VytSM9OMB2agWxWbKQe/exec";
  var params = new URLSearchParams(window.location.search);
  var source = params.get("source") || "default";
  var session = params.get("session") || "";
  var apiUrl = apiBaseUrl + "?source=" + encodeURIComponent(source) + "&session=" + encodeURIComponent(session);

  setStatusLine(
    "source=" + source +
    " | session=" + (session || "-") +
    " | status=loading"
  );

  buildRain();
  buildStars();

  fetch(apiUrl, { cache: "no-store" })
    .then(function(res) {
      return res.text().then(function(text) {
        return { status: res.status, text: text };
      });
    })
    .then(function(result) {
      var data;
      try {
        data = JSON.parse(result.text);
      } catch (e) {
        setStatusLine(
          "status=" + result.status +
          " | json=parse_error"
        );
        return;
      }

      var active = !!data.active;
      var messages = Array.isArray(data.messages) ? data.messages : [];
      var reason = data.reason || "-";
      var centerMode = messages.length > 0 && messages.length <= CENTER_MODE_THRESHOLD;

      setStatusLine(
        "source=" + source +
        " | session=" + (session || "-") +
        " | active=" + active +
        " | messages=" + messages.length +
        " | reason=" + reason
      );

      stage.innerHTML = "";

      if (centerMode) {
        stage.classList.add("center-mode");
      } else {
        stage.classList.remove("center-mode");
      }

      if (!active) {
        return;
      }

      if (messages.length === 0) {
        var emptyEl = document.createElement("div");
        emptyEl.className = "bubble";
        emptyEl.textContent = "messages が 0 件です";
        emptyEl.style.setProperty("--bubble-scale", "1");
        emptyEl.style.opacity = "1";
        emptyEl.style.zIndex = "1";
        applyBubbleAnimation(emptyEl, 0, 0);
        applyScatterStyle(emptyEl, 0, centerMode, 0);
        stage.appendChild(emptyEl);
        return;
      }

      var visualItems = messages.map(function(msg, i) {
        var text = String(msg.text || "");
        return {
          text: text,
          ageIndex: i,
          scatterKey: hashString(text + "__" + i)
        };
      });

      /* 全体に散るよう、見た目の並びを安定シャッフル */
      visualItems.sort(function(a, b) {
        return a.scatterKey - b.scatterKey;
      });

      visualItems.forEach(function(item, renderIndex) {
        var layerInfo = getLayerInfo(item.ageIndex, messages.length);

        var el = document.createElement("div");
        el.className = "bubble";
        el.textContent = item.text;

        /* 最新を前面、古いものを背面 */
        el.style.zIndex = String(messages.length - item.ageIndex);

        /* 新しい投稿ほど大きく・濃く */
        el.style.setProperty("--bubble-scale", String(layerInfo.scale));
        el.style.opacity = String(layerInfo.opacity);

        /* 少数時だけ中央から広がる */
        applyScatterStyle(el, item.scatterKey, centerMode, item.ageIndex);

        /* 動き */
        applyBubbleAnimation(el, renderIndex, item.scatterKey);

        stage.appendChild(el);
      });
    })
    .catch(function(err) {
      setStatusLine(
        "source=" + source +
        " | session=" + (session || "-") +
        " | fetch=error" +
        " | message=" + err.message
      );
    });

  window.addEventListener("resize", function() {
    buildRain();
    buildStars();
  });
</script>

</body>
</html>
``
