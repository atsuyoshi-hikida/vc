  <!-- viewport / safe-area -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Voice Cloud Safe</title>

  <!-- PWA / iOS -->
  <meta name="theme-color" content="#d8efff" id="themeColorMeta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Voice Cloud Safe">
  <link rel="apple-touch-icon" href="./icon-180.png">

  <!-- PWA manifest -->
  <link rel="manifest" href="./manifest.json">

  <!-- Google Fonts: Zen Kaku Gothic Antique -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overscroll-behavior: none;
    }

    /* ---- safe-area を考慮したUIパディングをCSS変数で管理 ---- */
    :root {
      --pad: 20px;
      --pad-top: calc(var(--pad) + env(safe-area-inset-top));
      --pad-right: calc(var(--pad) + env(safe-area-inset-right));
      --pad-bottom: calc(var(--pad) + env(safe-area-inset-bottom));
      --pad-left: calc(var(--pad) + env(safe-area-inset-left));
    }

    @media (max-width: 768px) {
      :root { --pad: 14px; }
    }

    body {
      margin: 0;
      padding: 0; /* ★ bodyの余白は0：背景が「端まで」になり、全面表示感が増える */
      font-family: "Zen Kaku Gothic Antique", sans-serif;
      font-weight: 400;
      overflow: hidden;
      position: relative;
      background: #d8ecff;
    }

    #sky {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(to bottom, #d8efff 0%, #bfe5ff 45%, #eaf6ff 100%);
    }

    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,0.98);
      box-shadow: 0 0 10px rgba(255,255,255,0.65);
      will-change: transform, opacity;
    }

    .shooting-star {
      position: absolute;
      width: 120px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(
        to right,
        rgba(255,255,255,0),
        rgba(255,255,255,0.98)
      );
      transform: rotate(-18deg);
      opacity: 0;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
      will-change: transform, opacity;
    }

    #rain {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 1;
    }

    .raindrop {
      position: absolute;
      top: -12vh;
      width: 2px;
      height: 56px;
      border-radius: 999px;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0.22),
        rgba(255,255,255,0.55)
      );
      transform: rotate(12deg);
      opacity: 0.5;
      will-change: transform, opacity;
      animation-name: rainFall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes rainFall {
      0% {
        transform: translate3d(0, -10vh, 0) rotate(12deg);
        opacity: 0;
      }
      10% {
        opacity: 0.45;
      }
      100% {
        transform: translate3d(18vw, 120vh, 0) rotate(12deg);
        opacity: 0;
      }
    }

    #ui {
      position: relative;
      z-index: 1;

      /* ★ 以前 body にあった padding を #ui に移動（safe-area込み） */
      padding: var(--pad-top) var(--pad-right) var(--pad-bottom) var(--pad-left);
      box-sizing: border-box;

      /* ★ 以前の calc(100vh - 40px) は「body padding前提」だったので 100vh に */
      min-height: 100vh;
    }

    #statusLine {
      position: sticky;
      top: 0;
      z-index: 20;
      display: inline-block;

      /* ★ UIパディング分を引く（左右の safe-area も含む） */
      max-width: calc(100vw - (var(--pad-left) + var(--pad-right)));

      margin-bottom: 10px;
      padding: 4px 10px;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(20, 20, 20, 0.72);
      background: rgba(255,255,255,0.38);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      user-select: none;
      font-family: "Zen Kaku Gothic Antique", sans-serif;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* 最新1〜3件の固定レイヤー（通常群を押し下げない） */
    #featuredLayer {
      position: absolute;
      left: 50%;
      top: 33vh;
      transform: translateX(-50%);
      width: min(1080px, 94vw);
      height: 220px;
      z-index: 50;
      pointer-events: none;
    }

    /* 三角形レイアウト用の相対コンテナ */
    #featuredStage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* 通常の吹き出し群 */
    #stage {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      align-content: flex-start;
      justify-content: center;
      gap: 0;
      position: relative;
      z-index: 1;

      /* ★ UIパディングを考慮して高さを調整（全面表示感が崩れにくい） */
      min-height: calc(100vh - (var(--pad-top) + var(--pad-bottom)) - 120px);

      padding-top: 6px;
    }

    #stage.center-mode {
      justify-content: center;
      align-content: center;
      min-height: calc(100vh - (var(--pad-top) + var(--pad-bottom)) - 140px);
    }

    .bubble {
      max-width: 260px;
      padding: 14px 18px;
      background: var(--bubble-bg, rgba(255,255,255,0.95));
      border: 2px solid #444;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.65;
      position: relative;
      will-change: transform, opacity, translate;
      animation-name: floatBubble;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
      transform-origin: center center;
      margin-right: -20px;
      margin-bottom: 4px;
      transition: opacity 0.35s ease, transform 0.35s ease, translate 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
      font-family: "Zen Kaku Gothic Antique", sans-serif;
      font-weight: 400;
      letter-spacing: 0.01em;
      pointer-events: none;

      /* escape は transform を壊さないため translate を利用 */
      translate: 0 0;
    }

    .bubble::before {
      content: "";
      position: absolute;
      bottom: -14px;
      left: 25px;
      border-width: 14px 12px 0;
      border-style: solid;
      border-color: #444 transparent transparent;
    }

    .bubble::after {
      content: "";
      position: absolute;
      bottom: -12px;
      left: 27px;
      border-width: 12px 10px 0;
      border-style: solid;
      border-color: var(--bubble-bg, rgba(255,255,255,0.95)) transparent transparent;
    }

    .bubble.newborn {
      animation-name: bubbleAppear, floatBubble;
      animation-duration: 0.35s, var(--bubble-float-duration, 6s);
      animation-delay: 0s, var(--bubble-float-delay, 0s);
      animation-fill-mode: both, none;
      animation-timing-function: ease-out, ease-in-out;
      animation-iteration-count: 1, infinite;
      animation-direction: normal, alternate;
    }

    /* featured 用 */
    .featured-bubble {
      position: absolute;
      margin-right: 0;
      margin-bottom: 0;
    }

    /* 三角形配置 */
    .featured-latest {
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .featured-second {
      left: calc(50% - 180px);
      top: 92px;
      transform: translateX(-50%);
    }

    .featured-third {
      left: calc(50% + 180px);
      top: 92px;
      transform: translateX(-50%);
    }

    .emoji-img {
      display: inline-block;
      width: 1.22em;
      height: 1.22em;
      vertical-align: -0.22em;
      margin: 0 0.04em;
      object-fit: contain;
    }

    @keyframes bubbleAppear {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(calc(var(--bubble-scale, 1) * 0.92));
      }
      100% {
        opacity: var(--bubble-opacity, 1);
        transform: translateY(0px) scale(var(--bubble-scale, 1));
      }
    }

    @keyframes floatBubble {
      0% {
        transform: translate(0px, 0px) scale(var(--bubble-scale, 1));
      }
      25% {
        transform: translate(4px, -6px) scale(var(--bubble-scale, 1));
      }
      50% {
        transform: translate(-3px, -10px) scale(var(--bubble-scale, 1));
      }
      75% {
        transform: translate(5px, -4px) scale(var(--bubble-scale, 1));
      }
      100% {
        transform: translate(-4px, 2px) scale(var(--bubble-scale, 1));
      }
    }

    /* タップで「やさしく逃げる」：translate だけ動かす + フェード */
    .bubble.escape {
      opacity: 0;
      translate: var(--escape-x, 0px) var(--escape-y, 0px);
    }
  </style>
</head>

  /* ===============================
     Androidの黒帯を“空の色”へ溶かす：
     meta[name="theme-color"] を空の上端色に追従
     =============================== */
  var themeColorMetaEl = document.getElementById("themeColorMeta");
  var lastThemeColor = "";
  var lastThemeUpdateMs = 0;

  function rgbToHex(r, g, b) {
    function to2(n) {
      var s = n.toString(16);
      return s.length === 1 ? "0" + s : s;
    }
    return "#" + to2(r) + to2(g) + to2(b);
  }

  function luminance(r, g, b) {
    return (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
  }

  function setThemeColorSoft(rgbArr, nowMs) {
    // 更新頻度を抑える（過負荷防止＆端末差の吸収）
    if ((nowMs - lastThemeUpdateMs) < 500) return;

    var r = rgbArr[0], g = rgbArr[1], b = rgbArr[2];

    // 暗すぎる時は少しだけ持ち上げ（ステータスバーアイコン視認性の保険）
    var lum = luminance(r, g, b);
    if (lum < 0.12) {
      r = Math.round(r * 0.85 + 30);
      g = Math.round(g * 0.85 + 30);
      b = Math.round(b * 0.85 + 30);
    }

    var hex = rgbToHex(r, g, b);
    if (hex === lastThemeColor) return;

    if (themeColorMetaEl) {
      themeColorMetaEl.setAttribute("content", hex);
    }
    lastThemeColor = hex;
    lastThemeUpdateMs = nowMs;
  }

  /* ===============================
     PWA起動時の「クエリ違い」対策：
     - 最後に成功した source/session を保存
     - start_url が default でも、保存済みがあれば自動復元
     =============================== */

  (function restoreQueryForPwa() {
    try {
      var p = new URLSearchParams(window.location.search);
      var curSource = p.get("source") || "";
      var curSession = p.get("session") || "";

      var saved = localStorage.getItem("vcs:lastQuery") || "";

      // savedがあり、今が「default+空session」またはクエリ不足なら savedへ寄せる
      // ループ防止：savedが現在と同一なら何もしない
      var curQs = p.toString();
      var isMissing = !(p.has("source") && p.has("session"));
      var isDefaultEmpty = (curSource === "default" && curSession === "");
      var shouldRedirect = saved && (isMissing || isDefaultEmpty) && (saved !== curQs);

      if (shouldRedirect) {
        var target = window.location.pathname + "?" + saved;
        window.location.replace(target);
        return;
      }

      // 現在のクエリ（source/sessionがある場合）を保存
      if (p.has("source") && p.has("session")) {
        localStorage.setItem("vcs:lastQuery", p.toString());
      }
    } catch (e) {
      // 保存/復元に失敗しても表示を壊さない
    }
  })();

    statusLineEl.textContent = text;
  }

  window.onerror = function(message, source, lineno, colno) {
    setStatusLine(
      "error | " +
      "message: " + message +
      " | line: " + lineno +
      " | col: " + colno
    );
  };

  function hashString(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  function seeded(seed) {
    var x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function mixColor(c1, c2, t) {
    return [
      Math.round(lerp(c1[0], c2[0], t)),
      Math.round(lerp(c1[1], c2[1], t)),
      Math.round(lerp(c1[2], c2[2], t))
    ];
  }

  function colorToCss(c) {
    return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
  }

  function getSkyKeyframes() {
    return [
      { p: 0.00, top: [120,145,179], mid: [182,199,217], bot: [237,245,251] },
      { p: 0.14, top: [185,220,255], mid: [217,239,255], bot: [245,251,255] },
      { p: 0.34, top: [159,215,255], mid: [207,238,255], bot: [243,251,255] },
      { p: 0.54, top: [126,200,255], mid: [191,232,255], bot: [238,249,255] },
      { p: 0.70, top: [69,109,168], mid: [126,159,192], bot: [201,215,230] },
      { p: 0.78, top: [5,18,32], mid: [10,19,36], bot: [16,35,61] },
      { p: 0.84, top: [0,0,106], mid: [0,11,58], bot: [6,20,39] },
      { p: 0.94, top: [0,0,106], mid: [0,11,58], bot: [6,20,39] },
      { p: 0.96, top: [30,45,73], mid: [76,98,128], bot: [159,176,196] },
      { p: 0.98, top: [80,109,145], mid: [145,170,194], bot: [215,228,239] },
      { p: 1.00, top: [120,145,179], mid: [182,199,217], bot: [237,245,251] }
    ];
  }

  function getInterpolatedSky(phase) {
    var frames = getSkyKeyframes();
    for (var i = 0; i < frames.length - 1; i++) {
      var a = frames[i];
      var b = frames[i + 1];
      if (phase >= a.p && phase <= b.p) {
        var span = b.p - a.p || 1;
        var t = (phase - a.p) / span;
        return {
          top: mixColor(a.top, b.top, t),
          mid: mixColor(a.mid, b.mid, t),
          bot: mixColor(a.bot, b.bot, t)
        };
      }
    }
    return {
      top: frames[frames.length - 1].top,
      mid: frames[frames.length - 1].mid,
      bot: frames[frames.length - 1].bot
    };
  }

  function getNightOpacity(phase) {
    if (phase < 0.72) return 0;
    if (phase < 0.80) return (phase - 0.72) / 0.08 * 0.55;
    if (phase < 0.84) return 0.55 + (phase - 0.80) / 0.04 * 0.45;
    if (phase < 0.94) return 1;
    if (phase < 0.97) return 1 - (phase - 0.94) / 0.03 * 0.55;
    if (phase < 1.00) return 0.45 - (phase - 0.97) / 0.03 * 0.45;
    return 0;
  }

  function getRainOpacity(phase) {
    if (phase < 0.74) return 1;
    if (phase < 0.82) return 1 - (phase - 0.74) / 0.08;
    if (phase < 0.98) return 0;
    if (phase <= 1.00) return (phase - 0.98) / 0.02;
    return 1;
  }

  function buildRain(serverNowMs) {
    rainEl.innerHTML = "";

    var isMobile = window.innerWidth <= 768;
    var dropCount = isMobile ? 24 : 38;
    var nowSec = serverNowMs / 1000;

    for (var i = 0; i < dropCount; i++) {
      var drop = document.createElement("div");
      drop.className = "raindrop";

      var left = (i * (100 / dropCount) + (i % 3) * 1.7 + seeded(i + 11) * 2.4) % 100;
      var duration = 1.8 + (i % 7) * 0.23 + seeded(i + 29) * 0.35;
      var opacity = 0.18 + seeded(i + 47) * 0.28;
      var height = (isMobile ? 34 : 42) + seeded(i + 61) * (isMobile ? 18 : 22);
      var offset = seeded(i + 73) * 12;

      drop.style.left = left + "vw";
      drop.style.animationDuration = duration + "s";
      drop.style.animationDelay = -((nowSec + offset) % duration) + "s";
      drop.style.opacity = opacity.toFixed(2);
      drop.style.height = height + "px";

      rainEl.appendChild(drop);
    }
  }

  function buildStars() {
    starsEl.innerHTML = "";
    stars = [];
    shootingStars = [];

    var isMobile = window.innerWidth <= 768;
    var starCount = isMobile ? 56 : 96;
    var shootingCount = isMobile ? 5 : 8;

    for (var i = 0; i < starCount; i++) {
      var starEl = document.createElement("div");
      starEl.className = "star";

      var seed = i + 101;
      var x = seeded(seed) * 100;
      var y = seeded(seed + 1) * 66;
      var size = 1 + seeded(seed + 2) * 2.6;
      var twinkleSpeed = 2.4 + seeded(seed + 3) * 3.4;
      var twinkleOffset = seeded(seed + 4) * Math.PI * 2;

      starEl.style.left = x + "vw";
      starEl.style.top = y + "vh";
      starEl.style.width = size + "px";
      starEl.style.height = size + "px";

      starsEl.appendChild(starEl);
      stars.push({
        el: starEl,
        size: size,
        twinkleSpeed: twinkleSpeed,
        twinkleOffset: twinkleOffset
      });
    }

    var configs = [
      { start: 0.812, duration: 0.011, x: 12, y: 12 },
      { start: 0.828, duration: 0.012, x: 14, y: 14 },
      { start: 0.846, duration: 0.012, x: 34, y: 11 },
      { start: 0.864, duration: 0.012, x: 46, y: 10 },
      { start: 0.882, duration: 0.013, x: 66, y: 22 },
      { start: 0.900, duration: 0.013, x: 28, y: 18 },
      { start: 0.918, duration: 0.013, x: 58, y: 16 },
      { start: 0.936, duration: 0.014, x: 74, y: 12 }
    ];

    for (var j = 0; j < shootingCount; j++) {
      var shotEl = document.createElement("div");
      shotEl.className = "shooting-star";
      starsEl.appendChild(shotEl);

      var cfg = configs[j];
      shootingStars.push({
        el: shotEl,
        start: cfg.start,
        duration: cfg.duration,
        x: cfg.x,
        y: cfg.y
      });
    }
  }

  function getSyncedNowMs() {
    if (syncedServerNowMs === null || syncedClientStartMs === null) {
      return Date.now();
    }
    return syncedServerNowMs + (Date.now() - syncedClientStartMs);
  }

  function updateSkyAndStars() {
    var nowMs = getSyncedNowMs();
    var phase = ((nowMs / 1000) % CYCLE_SECONDS) / CYCLE_SECONDS;

    var sky = getInterpolatedSky(phase);
    skyEl.style.background = "linear-gradient(to bottom, " +
      colorToCss(sky.top) + " 0%, " +
      colorToCss(sky.mid) + " 46%, " +
      colorToCss(sky.bot) + " 100%)";

    // ★ 追加：theme-color を空の上端色に追従
    setThemeColorSoft(sky.top, nowMs);

    var nightOpacity = getNightOpacity(phase);
    starsEl.style.opacity = String(nightOpacity);

    var rainOpacity = getRainOpacity(phase);
    rainEl.style.opacity = String(rainOpacity);

    var seconds = nowMs / 1000;

    for (var i = 0; i < stars.length; i++) {
      var star = stars[i];
      var tw = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(seconds * (2 * Math.PI / star.twinkleSpeed) + star.twinkleOffset));
      var scale = 0.85 + tw * 0.45;
      star.el.style.opacity = (nightOpacity * tw).toFixed(3);
      star.el.style.transform = "scale(" + scale.toFixed(3) + ")";
    }

    for (var j = 0; j < shootingStars.length; j++) {
      var shot = shootingStars[j];
      var start = shot.start;
      var end = shot.start + shot.duration;
      var local;

      if (phase >= start && phase <= end) {
        local = (phase - start) / shot.duration;
      } else {
        local = -1;
      }

      if (local >= 0) {
        var x = shot.x + local * 18;
        var y = shot.y + local * 12;
        var opacity = local < 0.15 ? (local / 0.15) : (1 - local) / 0.85;
        opacity = Math.max(0, Math.min(1, opacity)) * nightOpacity;

        shot.el.style.left = x + "vw";
        shot.el.style.top = y + "vh";
        shot.el.style.opacity = opacity.toFixed(3);
      } else {
        shot.el.style.opacity = "0";
      }
    }

    requestAnimationFrame(updateSkyAndStars);
  }

  function getLayerInfo(index, total) {
    var perLayer = Math.ceil(total / 4) || 1;
    var layer = Math.min(Math.floor(index / perLayer), 3);

    return {
      scale: [1.0, 0.85, 0.72, 0.60][layer],
      opacity: [1.0, 0.82, 0.64, 0.46][layer]
    };
  }

  function getBubbleColor(ageIndex) {
    if (ageIndex === 0) return "#ffffe0";
    if (ageIndex === 1 || ageIndex === 2) return "#fff0f5";
    return "#ffffff";
  }

  function getBubbleZIndex(ageIndex, total) {
    if (total > CENTER_MODE_THRESHOLD && ageIndex <= 2) {
      return 3000 - ageIndex;
    }
    return 1000 - ageIndex;
  }

  function getFeaturedClass(ageIndex, total) {
    if (!(total > CENTER_MODE_THRESHOLD && ageIndex <= 2)) {
      return "";
    }
    if (ageIndex === 0) return "featured-bubble featured-latest";
    if (ageIndex === 1) return "featured-bubble featured-second";
    if (ageIndex === 2) return "featured-bubble featured-third";
    return "";
  }

  function applyBubbleAnimation(el, index, scatterKey) {
    var duration = 5 + (index % 5) * 0.8 + (scatterKey % 3) * 0.25;
    var delay = (index % 7) * 0.4;
    el.style.setProperty("--bubble-float-duration", duration + "s");
    el.style.setProperty("--bubble-float-delay", delay + "s");
    el.style.animationDuration = duration + "s";
    el.style.animationDelay = delay + "s";
  }

  function applyScatterStyle(el, scatterKey, centerMode, ageIndex) {
    if (centerMode) {
      var centerTop = (scatterKey % 19) - 9;
      var centerLeft = (Math.floor(scatterKey / 10) % 17) - 8;
      var centerRightOverlap = -8 - (scatterKey % 12);
      var centerBottom = (Math.floor(scatterKey / 100) % 8) - 2;

      if (ageIndex === 0) {
        centerLeft = centerLeft * 0.35;
        centerTop = centerTop * 0.35;
      } else if (ageIndex === 1 || ageIndex === 2) {
        centerLeft = centerLeft * 0.55;
        centerTop = centerTop * 0.55;
      }

      el.style.marginTop = centerTop + "px";
      el.style.marginLeft = centerLeft + "px";
      el.style.marginRight = centerRightOverlap + "px";
      el.style.marginBottom = centerBottom + "px";
      return;
    }

    var topOffset = (scatterKey % 41) - 20;
    var leftOffset = (Math.floor(scatterKey / 10) % 25) - 12;
    var rightOverlap = -10 - (scatterKey % 25);
    var bottomOffset = (Math.floor(scatterKey / 100) % 14) - 4;

    if (ageIndex === 0) {
      topOffset = topOffset * 0.35;
      leftOffset = leftOffset * 0.35;
      rightOverlap = -8 - (scatterKey % 10);
      bottomOffset = bottomOffset * 0.45;
    } else if (ageIndex === 1 || ageIndex === 2) {
      topOffset = topOffset * 0.55;
      leftOffset = leftOffset * 0.55;
      rightOverlap = -9 - (scatterKey % 14);
      bottomOffset = bottomOffset * 0.6;
    }

    el.style.marginTop = topOffset + "px";
    el.style.marginLeft = leftOffset + "px";
    el.style.marginRight = rightOverlap + "px";
    el.style.marginBottom = bottomOffset + "px";
  }

  function buildMessageKeys(messages) {
    var counts = {};
    return messages.map(function(msg) {
      var text = String(msg.text || "");
      counts[text] = (counts[text] || 0) + 1;
      return text + "__" + counts[text];
    });
  }

  function getContainerByAgeIndex(ageIndex, total) {
    if (total > CENTER_MODE_THRESHOLD && ageIndex <= 2) {
      return featuredStage;
    }
    return stage;
  }

  function appendTextWithBreaks(parent, text) {
    var parts = String(text).split("\n");
    for (var i = 0; i < parts.length; i++) {
      if (parts[i]) {
        parent.appendChild(document.createTextNode(parts[i]));
      }
      if (i < parts.length - 1) {
        parent.appendChild(document.createElement("br"));
      }
    }
  }

  function appendStandardEmojiOrRaw(parent, shortcodeToken) {
    var name = shortcodeToken.slice(1, -1);
    var unicodeEmoji = STANDARD_EMOJI_MAP[name];

    if (unicodeEmoji) {
      parent.appendChild(document.createTextNode(unicodeEmoji));
    } else {
      appendTextWithBreaks(parent, shortcodeToken);
    }
  }

  function renderMessageContent(el, text) {
    el.textContent = "";

    var raw = String(text || "");
    var regex = /:([a-zA-Z0-9_+\-]+):/g;
    var lastIndex = 0;
    var match;

    while ((match = regex.exec(raw)) !== null) {
      var fullMatch = match[0];
      var emojiName = match[1];
      var emojiUrl = currentEmojiMap[emojiName];

      if (match.index > lastIndex) {
        appendTextWithBreaks(el, raw.slice(lastIndex, match.index));
      }

      if (emojiUrl) {
        var img = document.createElement("img");
        img.className = "emoji-img";
        img.src = emojiUrl;
        img.alt = fullMatch;
        img.title = fullMatch;
        img.loading = "lazy";
        img.decoding = "async";
        el.appendChild(img);
      } else {
        appendStandardEmojiOrRaw(el, fullMatch);
      }

      lastIndex = regex.lastIndex;
    }

    if (lastIndex < raw.length) {
      appendTextWithBreaks(el, raw.slice(lastIndex));
    }
  }

  function createBubble(key, text, renderIndex, ageIndex, total, centerMode) {
    var el = document.createElement("div");
    el.className = "bubble newborn";
    var extraClass = getFeaturedClass(ageIndex, total);
    if (extraClass) {
      el.className += " " + extraClass;
    }

    renderMessageContent(el, text);

    var scatterKey = hashString(key);
    var layerInfo = getLayerInfo(ageIndex, total);
    var bubbleColor = getBubbleColor(ageIndex);
    var container = getContainerByAgeIndex(ageIndex, total);

    el.style.zIndex = String(getBubbleZIndex(ageIndex, total));
    el.style.setProperty("--bubble-scale", String(layerInfo.scale));
    el.style.setProperty("--bubble-opacity", String(layerInfo.opacity));
    el.style.setProperty("--bubble-bg", bubbleColor);
    el.style.opacity = String(layerInfo.opacity);

    applyScatterStyle(el, scatterKey, centerMode, ageIndex);
    applyBubbleAnimation(el, renderIndex, scatterKey);

    el.style.order = String(renderIndex);
    container.appendChild(el);

    setTimeout(function() {
      if (el.classList.contains("newborn")) {
        el.classList.remove("newborn");
      }
    }, 500);

    bubbleMap[key] = {
      el: el,
      text: text,
      ageIndex: ageIndex
    };
  }

  function updateBubble(key, text, renderIndex, ageIndex, total, centerMode) {
    var item = bubbleMap[key];
    var el = item.el;
    var scatterKey = hashString(key);
    var layerInfo = getLayerInfo(ageIndex, total);
    var bubbleColor = getBubbleColor(ageIndex);
    var container = getContainerByAgeIndex(ageIndex, total);
    var extraClass = getFeaturedClass(ageIndex, total);

    renderMessageContent(el, text);
    item.text = text;

    el.className = "bubble" + (el.classList.contains("newborn") ? " newborn" : "") + (extraClass ? " " + extraClass : "");

    if (el.parentNode !== container) {
      container.appendChild(el);
    }

    item.ageIndex = ageIndex;

    el.style.zIndex = String(getBubbleZIndex(ageIndex, total));
    el.style.setProperty("--bubble-scale", String(layerInfo.scale));
    el.style.setProperty("--bubble-opacity", String(layerInfo.opacity));
    el.style.setProperty("--bubble-bg", bubbleColor);
    el.style.opacity = String(layerInfo.opacity);
    el.style.order = String(renderIndex);

    applyScatterStyle(el, scatterKey, centerMode, ageIndex);
    applyBubbleAnimation(el, renderIndex, scatterKey);
  }

  function removeMissingBubbles(nextKeySet) {
    Object.keys(bubbleMap).forEach(function(key) {
      if (!nextKeySet.has(key)) {
        bubbleMap[key].el.remove();
        delete bubbleMap[key];
      }
    });
  }

  function clearPlaceholderIfNeeded() {
    if (bubbleMap[emptyBubbleKey]) {
      bubbleMap[emptyBubbleKey].el.remove();
      delete bubbleMap[emptyBubbleKey];
    }
  }

  function renderEmpty(centerMode) {
    removeMissingBubbles(new Set([emptyBubbleKey]));

    if (!bubbleMap[emptyBubbleKey]) {
      createBubble(emptyBubbleKey, "messages が 0 件です", 0, 0, 1, centerMode);
    } else {
      updateBubble(emptyBubbleKey, "messages が 0 件です", 0, 0, 1, centerMode);
    }
  }

  function syncMessages(messages) {
    var centerMode = messages.length > 0 && messages.length <= CENTER_MODE_THRESHOLD;

    if (centerMode) {
      stage.classList.add("center-mode");
    } else {
      stage.classList.remove("center-mode");
    }

    if (messages.length === 0) {
      featuredStage.innerHTML = "";
      renderEmpty(centerMode);
      return;
    }

    clearPlaceholderIfNeeded();

    var keys = buildMessageKeys(messages);

    var newestItems = [];
    var otherItems = [];

    messages.forEach(function(msg, i) {
      var item = {
        key: keys[i],
        text: String(msg.text || ""),
        ageIndex: i
      };

      if (!centerMode && i <= 2) {
        newestItems.push(item);
      } else {
        otherItems.push(item);
      }
    });

    newestItems.sort(function(a, b) {
      return a.ageIndex - b.ageIndex;
    });

    otherItems.sort(function(a, b) {
      return hashString(a.key) - hashString(b.key);
    });

    var visualItems = newestItems.concat(otherItems);
    var nextKeySet = new Set(visualItems.map(function(item) { return item.key; }));

    visualItems.forEach(function(item, renderIndex) {
      if (!bubbleMap[item.key]) {
        createBubble(item.key, item.text, renderIndex, item.ageIndex, messages.length, centerMode);
      } else {
        updateBubble(item.key, item.text, renderIndex, item.ageIndex, messages.length, centerMode);
      }
    });

    removeMissingBubbles(nextKeySet);
  }

  var apiBaseUrl = "https://script.google.com/macros/s/AKfycbxMjaP_v9pUhkILWdtbDh7pBujrMNp3glAUBp18qutF6-b09VytSM9OMB2agWxWbKQe/exec";
  var params = new URLSearchParams(window.location.search);
  var source = params.get("source") || "default";
  var session = params.get("session") || "";

  // ★ source/session を常に保存（PWA復元用）
  try {
    localStorage.setItem(
      "vcs:lastQuery",
      "source=" + encodeURIComponent(source) + "&session=" + encodeURIComponent(session)
    );
  } catch(e) {}

  var apiUrl = apiBaseUrl + "?source=" + encodeURIComponent(source) + "&session=" + encodeURIComponent(session);

  async function updateMessages() {
    try {
      var res = await fetch(apiUrl, { cache: "no-store" });
      var data = await res.json();

      var active = !!data.active;
      var messages = Array.isArray(data.messages) ? data.messages : [];
      var reason = data.reason || "-";
      var serverNow = typeof data.serverNow === "number" ? data.serverNow : Date.now();
      currentEmojiMap = (data && typeof data.emojiMap === "object" && data.emojiMap) ? data.emojiMap : {};

      syncedServerNowMs = serverNow;
      syncedClientStartMs = Date.now();

      if (!skyLoopStarted) {
        buildRain(serverNow);
        buildStars();
        updateSkyAndStars();
        skyLoopStarted = true;
      }

      setStatusLine(
        "source=" + source +
        " | session=" + (session || "-") +
        " | active=" + active +
        " | messages=" + messages.length +
        " | reason=" + reason +
        " | emoji=" + Object.keys(currentEmojiMap).length +
        " | sync=server"
      );

      if (!active) {
        Object.keys(bubbleMap).forEach(function(key) {
          bubbleMap[key].el.remove();
        });
        bubbleMap = {};
        featuredStage.innerHTML = "";
        return;
      }

      syncMessages(messages);

    } catch (err) {
      setStatusLine(
        "source=" + source +
        " | session=" + (session || "-") +
        " | fetch=error" +
        " | message=" + err.message
      );
    }
  }

  setStatusLine(
    "source=" + source +
    " | session=" + (session || "-") +
    " | status=loading"
  );

  updateMessages();
  setInterval(updateMessages, UPDATE_INTERVAL);

  window.addEventListener("resize", function() {
    var nowMs = getSyncedNowMs();
    buildRain(nowMs);
    buildStars();
  });

  /* ===============================
     タップで「やさしく逃げる」＋ 連打防止 ＋ 群れ感で戻る
     =============================== */

  var scatterToken = 0;

  function scatterBubblesSoft(clientX, clientY) {
    scatterToken++;
    var token = scatterToken;

    var bubbles = document.querySelectorAll(".bubble");

    // 逃げる：全員一斉に
    for (var i = 0; i < bubbles.length; i++) {
      var el = bubbles[i];
      var rect = el.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;

      var dx = cx - clientX;
      var dy = cy - clientY;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;

      var nx = dx / dist;
      var ny = dy / dist;

      var power = 80 + Math.random() * 40; // やさしい距離
      el.style.setProperty("--escape-x", (nx * power).toFixed(1) + "px");
      el.style.setProperty("--escape-y", (ny * power).toFixed(1) + "px");
      el.classList.add("escape");
    }

    // 戻る：群れ感（900ms + 50〜300ms を個体差）
    var baseReturnMs = 900;
    for (var j = 0; j < bubbles.length; j++) {
      (function(el){
        var jitter = 50 + Math.random() * 250; // 50〜300ms
        setTimeout(function(){
          if (token !== scatterToken) return;
          el.classList.remove("escape");
          el.style.removeProperty("--escape-x");
          el.style.removeProperty("--escape-y");
        }, baseReturnMs + jitter);
      })(bubbles[j]);
    }
  }

  var escapeLock = false;
  document.addEventListener("click", function(e) {
    if (escapeLock) return;
    escapeLock = true;

    scatterBubblesSoft(e.clientX, e.clientY);

    setTimeout(function() {
      escapeLock = false;
    }, 1200);
  });

  /* ===============================
     Service Worker（PWA）
     =============================== */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("./sw.js").catch(function(err) {
        console.warn("SW register failed:", err);
      });
    });
  }
</script>
