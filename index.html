<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Cloud</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(
      to bottom,
      #eaf5ff 0%,
      #d6ecff 60%,
      #cfe8ff 100%
    );
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .bubble {
    position: absolute;
    max-width: 260px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.95);
    border: 2px solid #444;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    word-break: break-word;
    pointer-events: none;
    user-select: none;
    will-change: left, top, transform;
  }

  .bubble::after {
    content: "";
    position: absolute;
    bottom: -14px;
    left: 28px;
    border-width: 14px 12px 0;
    border-style: solid;
    border-color: #444 transparent transparent;
  }

  @media (max-width: 768px) {
    * {
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  }
</style>
</head>

<body>
<div id="stage"></div>

<script>
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbwVCvpcSZTDfiKC-dRwm5_zEzd8ndvBM4RiRsT13Tv0tWfGzEbtzRnZ3Jx8RPFwKxJD/exec";
const params = new URLSearchParams(window.location.search);
const source = params.get("source") || "default";
const API_URL = `${API_BASE_URL}?source=${encodeURIComponent(source)}`;

const UPDATE_INTERVAL = 5000;

const LAYERS = 4;
const SIZE = [0.82, 0.68, 0.58, 0.50];
const OPACITY = [1.0, 0.82, 0.64, 0.46];
const RADII = [120, 220, 320, 430];

/* 少しだけ動く → もう少し動く */
const FLOAT_RADIUS_BASE = 14;
const FLOAT_SPEED_BASE = 0.00055;
const FOLLOW_SPEED = 0.04;

const stage = document.getElementById("stage");
let bubbles = {};
let lastTime = performance.now();

function hashString(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function seeded(seed) {
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function buildKeyList(messages) {
  const counts = {};
  return messages.map(msg => {
    const text = String(msg.text || "");
    counts[text] = (counts[text] || 0) + 1;
    return text + "__" + counts[text];
  });
}

function relaxOverlap(list) {
  const MIN_DIST = 170;
  const POWER = 0.28;

  for (let loop = 0; loop < 8; loop++) {
    for (let i = 0; i < list.length; i++) {
      for (let j = i + 1; j < list.length; j++) {
        const a = list[i];
        const b = list[j];
        const dx = a.targetX - b.targetX;
        const dy = a.targetY - b.targetY;
        const dist = Math.hypot(dx, dy);

        if (dist < MIN_DIST) {
          const push = (MIN_DIST - dist) * POWER;
          const nx = dx / (dist || 1);
          const ny = dy / (dist || 1);

          a.targetX += nx * push;
          a.targetY += ny * push;
          b.targetX -= nx * push;
          b.targetY -= ny * push;
        }
      }
    }
  }
}

function clampToStage(list) {
  const w = window.innerWidth;
  const h = window.innerHeight;

  list.forEach(b => {
    b.targetX = Math.max(12, Math.min(w - 280, b.targetX));
    b.targetY = Math.max(12, Math.min(h - 90, b.targetY));
  });
}

function createBubble(item, zIndex) {
  const el = document.createElement("div");
  el.className = "bubble";
  el.textContent = item.text;
  el.style.opacity = item.opacity;
  el.style.zIndex = String(zIndex);
  el.style.transform = `scale(${item.scale})`;
  stage.appendChild(el);

  return {
    key: item.key,
    text: item.text,
    el,
    x: item.targetX,
    y: item.targetY,
    targetX: item.targetX,
    targetY: item.targetY,
    scale: item.scale,
    opacity: item.opacity,
    phase: item.phase,
    floatRadius: item.floatRadius,
    floatSpeed: item.floatSpeed
  };
}

function syncBubbles(layout, messagesLength) {
  const nextKeys = new Set(layout.map(item => item.key));

  Object.keys(bubbles).forEach(key => {
    if (!nextKeys.has(key)) {
      bubbles[key].el.remove();
      delete bubbles[key];
    }
  });

  layout.forEach((item, i) => {
    const zIndex = messagesLength - i;

    if (!bubbles[item.key]) {
      bubbles[item.key] = createBubble(item, zIndex);
    } else {
      const b = bubbles[item.key];
      b.text = item.text;
      b.el.textContent = item.text;
      b.targetX = item.targetX;
      b.targetY = item.targetY;
      b.scale = item.scale;
      b.opacity = item.opacity;
      b.el.style.opacity = item.opacity;
      b.el.style.zIndex = String(zIndex);
      b.floatRadius = item.floatRadius;
      b.floatSpeed = item.floatSpeed;
    }
  });
}

function buildLayout(messages) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const perLayer = Math.ceil(messages.length / LAYERS) || 1;
  const keys = buildKeyList(messages);

  const list = messages.map((msg, i) => {
    const text = String(msg.text || "");
    const key = keys[i];
    const layer = Math.min(Math.floor(i / perLayer), LAYERS - 1);

    const seed = hashString(key);
    const angle = seeded(seed + 1) * Math.PI * 2;
    const radius = RADII[layer] * (0.92 + seeded(seed + 2) * 0.16);

    return {
      key,
      text,
      layer,
      scale: SIZE[layer],
      opacity: OPACITY[layer],
      targetX: cx + Math.cos(angle) * radius,
      targetY: cy + Math.sin(angle) * radius,
      phase: seeded(seed + 3) * Math.PI * 2,
      floatRadius: FLOAT_RADIUS_BASE * (0.9 + seeded(seed + 4) * 0.25),
      floatSpeed: FLOAT_SPEED_BASE * (0.9 + seeded(seed + 5) * 0.2)
    };
  });

  relaxOverlap(list);
  clampToStage(list);

  return list;
}

function animate(now) {
  const delta = Math.min((now - lastTime) / 16.666, 2);
  lastTime = now;

  Object.values(bubbles).forEach(b => {
    b.phase += b.floatSpeed * delta;

    const fx = Math.cos(b.phase) * b.floatRadius;
    const fy = Math.sin(b.phase) * b.floatRadius;

    b.x += (b.targetX + fx - b.x) * FOLLOW_SPEED * delta;
    b.y += (b.targetY + fy - b.y) * FOLLOW_SPEED * delta;

    b.el.style.left = `${b.x}px`;
    b.el.style.top = `${b.y}px`;
    b.el.style.transform = `scale(${b.scale})`;
  });

  requestAnimationFrame(animate);
}

async function update() {
  try {
    const res = await fetch(API_URL, { cache: "no-store" });
    const data = await res.json();
    const messages = Array.isArray(data.messages) ? data.messages : [];

    const layout = buildLayout(messages);
    syncBubbles(layout, messages.length);

  } catch (error) {
    console.error("データ取得エラー:", error);
  }
}

update();
requestAnimationFrame(animate);
setInterval(update, UPDATE_INTERVAL);
</script>
</body>
</html>
``
