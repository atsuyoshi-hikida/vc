<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Cloud</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(
      to bottom,
      #eaf5ff 0%,
      #d6ecff 60%,
      #cfe8ff 100%
    );
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .bubble {
    position: absolute;
    max-width: 260px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.95);
    border: 2px solid #444;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    word-break: break-word;
    pointer-events: none;
    user-select: none;
  }

  .bubble::after {
    content: "";
    position: absolute;
    bottom: -14px;
    left: 28px;
    border-width: 14px 12px 0;
    border-style: solid;
    border-color: #444 transparent transparent;
  }

  @media (max-width: 768px) {
    * {
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  }
</style>
</head>

<body>
<div id="stage"></div>

<script>
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbwVCvpcSZTDfiKC-dRwm5_zEzd8ndvBM4RiRsT13Tv0tWfGzEbtzRnZ3Jx8RPFwKxJD/exec";
const params = new URLSearchParams(window.location.search);
const source = params.get("source") || "default";
const API_URL = `${API_BASE_URL}?source=${encodeURIComponent(source)}`;

const UPDATE_INTERVAL = 5000;

const LAYERS = 4;
const SIZE = [0.8, 0.6, 0.5, 0.4];
const OPACITY = [1.0, 0.75, 0.55, 0.35];
const RADII = [110, 180, 260, 350];

const FLOAT_RADIUS_BASE = 42;
const FLOAT_SPEED_BASE  = 0.0018;
const NOISE_RADIUS = 7;
const NOISE_SPEED  = 0.008;

const stage = document.getElementById("stage");
let bubbles = {};
let lastTime = performance.now();

/* 重なり緩和 */
function relaxOverlap(list) {
  const MIN_DIST = 160;
  const POWER = 0.22;

  for (let i = 0; i < list.length; i++) {
    for (let j = i + 1; j < list.length; j++) {
      const a = list[i];
      const b = list[j];
      const dx = a.baseX - b.baseX;
      const dy = a.baseY - b.baseY;
      const dist = Math.hypot(dx, dy);

      if (dist < MIN_DIST) {
        const push = (MIN_DIST - dist) * POWER;
        const nx = dx / (dist || 1);
        const ny = dy / (dist || 1);

        a.baseX += nx * push;
        a.baseY += ny * push;
        b.baseX -= nx * push;
        b.baseY -= ny * push;
      }
    }
  }
}

/* 中心から拡散 */
function disperseFromCenter(list, cx, cy) {
  const POWER = 0.12;

  list.forEach(b => {
    const dx = b.baseX - cx;
    const dy = b.baseY - cy;
    const dist = Math.hypot(dx, dy) || 1;
    const push = Math.max(0, 240 - dist) * POWER;

    b.baseX += (dx / dist) * push;
    b.baseY += (dy / dist) * push;
  });
}

/* アニメーション */
function animate(now) {
  const delta = Math.min((now - lastTime) / 16.666, 2);
  lastTime = now;

  Object.values(bubbles).forEach(b => {
    b.phase += b.floatSpeed * delta;
    b.noisePhase += NOISE_SPEED * delta;

    const fx = Math.cos(b.phase) * b.floatRadius;
    const fy = Math.sin(b.phase) * b.floatRadius;
    const nx = Math.cos(b.noisePhase * 1.7) * NOISE_RADIUS;
    const ny = Math.sin(b.noisePhase * 1.3) * NOISE_RADIUS;

    b.x += (b.baseX + fx + nx - b.x) * 0.04 * delta;
    b.y += (b.baseY + fy + ny - b.y) * 0.04 * delta;

    b.el.style.left = `${b.x}px`;
    b.el.style.top  = `${b.y}px`;
  });

  requestAnimationFrame(animate);
}

/* 更新 */
async function update() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    const messages = Array.isArray(data.messages) ? data.messages : [];

    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const perLayer = Math.ceil(messages.length / LAYERS) || 1;

    const bubbleList = [];
    stage.innerHTML = "";
    bubbles = {};

    messages.forEach((msg, i) => {
      const layer = Math.min(Math.floor(i / perLayer), LAYERS - 1);
      const count = i % perLayer;

      const angle =
        (i / Math.max(messages.length, 1)) * Math.PI * 2 +
        (Math.random() - 0.5) * 0.45;

      const radius =
        RADII[layer] * (0.9 + Math.random() * 0.24) +
        count * 18;

      const baseX = cx + Math.cos(angle) * radius;
      const baseY = cy + Math.sin(angle) * radius;

      const el = document.createElement("div");
      el.className = "bubble";
      el.textContent = msg.text || "";
      el.style.transform = `scale(${SIZE[layer]})`;
      el.style.opacity = OPACITY[layer];

      /* 新しい投稿を前面、古い投稿を背面 */
      el.style.zIndex = String(messages.length - i);

      stage.appendChild(el);

      bubbleList.push({
        el,
        x: baseX,
        y: baseY,
        baseX,
        baseY,
        phase: Math.random() * Math.PI * 2,
        noisePhase: Math.random() * Math.PI * 2,
        floatRadius: FLOAT_RADIUS_BASE * (0.85 + Math.random() * 0.3),
        floatSpeed: FLOAT_SPEED_BASE
      });
    });

    relaxOverlap(bubbleList);
    disperseFromCenter(bubbleList, cx, cy);

    bubbleList.forEach((b, i) => {
      bubbles[`bubble_${i}`] = b;
    });

  } catch (error) {
    console.error("データ取得エラー:", error);
  }
}

update();
requestAnimationFrame(animate);
setInterval(update, UPDATE_INTERVAL);
</script>
</body>
</html>
